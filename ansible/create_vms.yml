- name: Create VMs
  hosts: all
  vars:
    lab_rsa: "ssh-rsa  LabGradingKey"

  tasks:

    - name: Import task to create a fact from the survey
      ansible.builtin.include_tasks: tasks/create_fact.yml

    - name: Create labkey secret
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: labkey
            namespace: "{{ target_ns }}"
          type: Opaque
          data:
            key: "{{ lab_rsa | b64encode }}"

    - name: Create the VMs by using a loop
      loop: "{{ vms }}"
      redhat.openshift_virtualization.kubevirt_vm:
        state: present
        name: "{{ item.name }}"
        namespace: "{{ target_ns }}"
        running: true
        preference:
          name: rhel.9
        data_volume_templates:
          - metadata:
              name: "{{ item.name }}-volume"
              namespace: "{{ target_ns }}"
            spec:
              sourceRef:
                kind: DataSource
                name: rhel9
                namespace: openshift-virtualization-os-images
              storage:
                resources: {}
        spec:
          template:
            metadata:
              labels:
                name: "{{ item.name }}"
          domain:
            cpu:
              cores: 1
              sockets: 1
              threads: 1
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
                  model: virtio
                - name: bridge-network
                  bridge: {}
            memory:
              guest: 2Gi
          networks:
            - name: default
              pod: {}
            - name: bridge-network
              multus:
                networkName: default/vm-private-net
          volumes:
            - name: rootdisk
              dataVolume:
                name: "{{ item.name }}-volume"
            - name: cloudinitdisk
              cloudInitNoCloud:
                userData: |
                  #cloud-config
                  user: cloud-user
                  password: redhat
                  chpasswd:
                    expire: false
                  runcmd:
                    - [ setsebool, -P, virt_qemu_ga_manage_ssh, on ]
                networkData: |-
                  version: 2
                  ethernets:
                    eth1:
                      addresses:
                        - "{{ item.ip }}/24"
          accessCredentials:
            - sshPublicKey:
                propagationMethod:
                  qemuGuestAgent:
                    users:
                      - cloud-user
                source:
                  secret:
                    secretName: labkey

    - name: Wait until the VirtualMachine is started
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      redhat.openshift_virtualization.kubevirt_vm:
        name: "{{ item.name }}"
        namespace: "{{ target_ns }}"
        running: true
      register: vm_status
      until: vm_status.result.status.printableStatus == "Running"
      retries: 60
      delay: 5
