- name: Create VMs
  hosts: all
  vars:
    lab_rsa: "ssh-rsa  LabGradingKey"

  tasks:

    - name: Create labkey secret
      redhat.openshift.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: labkey
            namespace: "{{ target_ns }}"
          type: Opaque
          data:
            key: "{{ lab_rsa | b64encode }}"

    - name: Create RHEL virtual machines
      redhat.openshift_virtualization.kubevirt_vm:
        state: present
        name: "{{ item.name }}"
        namespace: "{{ target_ns }}"
        instancetype:
          name: u1.small
        preference:
          name: rhel.9
        data_volume_templates:
          - metadata:
              name: "{{ item.name }}-volume"
              namespace: "{{ target_ns }}"
            spec:
              sourceRef:
                kind: DataSource
                name: rhel9
                namespace: openshift-virtualization-os-images
              storage:
                resources: {}
        spec:
          template:
            metadata:
              labels:
                name: "{{ item.name }}"
          domain:
            devices:
              interfaces:
                - name: default
                  masquerade: {}
                - name: bridge-network
                  bridge: {}
          networks:
            - name: default
              pod: {}
            - name: bridge-network
              multus:
                networkName: default/vm-private-net
          volumes:
            - name: rootdisk
              dataVolume:
                name: "{{ item.name }}-volume"
            - name: cloudinitdisk
              cloudInitNoCloud:
                userData: |-
                  #cloud-config
                  user: cloud-user
                  password: redhat
                  chpasswd:
                    expire: false
                  runcmd:
                  - [ setsebool, -P, virt_qemu_ga_manage_ssh, on ]
                networkData: |-
                  version: 2
                  ethernets:
                    eth1:
                      addresses:
                      - "{{ item.ip }}/24"
          accessCredentials:
            - sshPublicKey:
                propagationMethod:
                  qemuGuestAgent:
                    users:
                      - cloud-user
                source:
                  secret:
                    secretName: labkey
      loop: "{{ vm | from_yaml }}"

    - name: Wait for virtual machine IPs to be populated
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        name: "{{ item.name }}"
        namespace: "{{ target_ns }}"
      register: vmi
      retries: 60
      delay: 10
      until: (vmi.resources[0].status.interfaces[0]['ipAddress'] | default('')) | length > 0
      loop: "{{ vm | from_yaml }}"

    - name: Pause for 1 minute to ensure that VMs are up
      ansible.builtin.pause:
        minutes: 1
